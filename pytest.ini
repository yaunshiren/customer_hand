[pytest]
testpaths = test
addopts = -m "not integration"
markers =
    integration: test requiring an explicitly enabled non-unit dependency
    mysql: test requiring an isolated MySQL test database and RUN_MYSQL_INTEGRATION=1
    redis: test requiring an isolated Redis service and RUN_REDIS_INTEGRATION=1
    external: test calling an external provider and its explicit RUN_*_INTEGRATION gate
