version: enterprise_v1

clarification:
  min_confidence: 0.65
  min_margin: 0.12
  max_candidates: 3
  default_question: "我还不太确定你的具体需求，可以补充一下你想咨询的问题吗？"

groups:
  - id: KB
    name: 知识库问答
    level: domain
    kind: KB
    description: 商品、使用、售后政策等可由知识库回答的问题。

  - id: KB_PRE_SALE
    parent_id: KB
    name: 售前咨询
    level: category
    kind: KB
    description: 购买前关于选型、参数、价格、库存、兼容、场景的问题。

  - id: KB_USAGE
    parent_id: KB
    name: 使用支持
    level: category
    kind: KB
    description: 产品使用、联网、APP、固件、联动、维护相关问题。

  - id: KB_AFTER_SALE
    parent_id: KB
    name: 售后政策
    level: category
    kind: KB
    description: 保修、退换货、物流、发票会员等售后规则问题。

  - id: MCP
    name: 实时业务工具
    level: domain
    kind: MCP
    description: 需要查询实时业务系统或执行业务动作的问题。

  - id: TICKET
    name: 用户反馈
    level: domain
    kind: TICKET
    description: 故障、建议、投诉等需要记录或人工跟进的问题。

  - id: SYSTEM
    name: 系统交互
    level: domain
    kind: SYSTEM
    description: 寒暄、能力介绍、越界问题、提示词或安全边界问题。

intents:
  - id: S1_选购推荐
    parent_id: KB_PRE_SALE
    level: intent
    name: 选购推荐
    type: KB
    kind: KB
    route: rag
    aliases:
      - 购买推荐
      - 预算推荐
      - 场景推荐
      - 礼物推荐
    description: 用户希望根据预算、使用场景、送礼对象、人群、空间环境或偏好获得商品推荐。
    examples:
      - 预算 3000 元左右，想买一台拍照还不错的手机，推荐哪款？
      - 送父母礼物，想实用一点，买什么比较合适？
      - 学生党买手机，主要上课拍 PPT、刷视频和续航，怎么选？
      - 家里养猫，想买扫地机器人，哪款不容易缠毛？
    negative_examples:
      - 小米 14 Pro 的屏幕尺寸是多少？
      - 小米 14 和小米 14 Pro 有什么区别？
    clarify_question: "你是想让我按预算推荐商品，还是想了解某款产品的具体参数？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S2_参数咨询
    parent_id: KB_PRE_SALE
    level: intent
    name: 参数咨询
    type: KB
    kind: KB
    route: rag
    aliases:
      - 产品参数
      - 规格咨询
      - 配置查询
    description: 用户询问单个产品的屏幕、电池、重量、尺寸、功率、刷新率、延迟、适用面积、续航等静态参数。
    examples:
      - 小米 14 Pro 的屏幕尺寸和刷新率是多少？
      - Redmi K70 电池容量多大，支持多少瓦快充？
      - 米家空气净化器 4 Pro 适合多大面积？
      - 小米平板 6 支持手写笔吗？
    negative_examples:
      - 小米 14 和小米 14 Pro 有什么区别？
      - 预算 3000 元左右推荐哪款手机？
    clarify_question: "你是想了解某个产品的具体参数，还是想对比多款产品怎么选？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S3_对比选购
    parent_id: KB_PRE_SALE
    level: intent
    name: 对比选购
    type: KB
    kind: KB
    route: rag
    aliases:
      - 产品对比
      - 型号对比
      - 差异咨询
      - 哪个值得买
    description: 用户比较两个或多个产品、型号、配置、场景适配、价格价值或购买建议。
    examples:
      - 小米 14 和小米 14 Pro 有什么区别？
      - 石头 T7 和 T7S Plus 区别？
      - Redmi Buds 3 Pro 和小米 Buds 4 哪个降噪好？
      - 我在小米 14 和 14 Pro 之间纠结，多花 1000 值吗？
    negative_examples:
      - 小米 14 Pro 的电池容量是多少？
      - 预算 5000 推荐一台手机
    clarify_question: "你是想比较几款产品的差异，还是只想了解其中一款的参数？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S4_价格活动
    parent_id: KB_PRE_SALE
    level: intent
    name: 价格活动
    type: KB_TOOL
    kind: KB
    route: rag
    aliases:
      - 优惠活动
      - 价格
      - 优惠券
      - 价保
      - 补差价
    description: 用户询问商品价格、优惠活动、优惠券、学生优惠、价保、降价补差等价格相关问题。
    examples:
      - 小米 14 Pro 现在有什么优惠活动？
      - 小米 14 Pro 多少钱？
      - 学生有优惠吗？
      - 刚买完就降价还能处理吗？
    negative_examples:
      - 订单现在到哪里了？
      - 商品有没有现货？
    clarify_question: "你是想了解当前价格优惠，还是想咨询价保/补差价规则？"
    route_policy:
      execution_route: rag
      system_route: kb_tool
      requires_rag: true

  - id: S5_库存到货
    parent_id: KB_PRE_SALE
    level: intent
    name: 库存到货
    type: KB_TOOL
    kind: KB
    route: rag
    aliases:
      - 现货库存
      - 到货时间
      - 发货时效
      - 补货
      - 缺货
    description: 用户询问商品是否现货、库存、补货时间、新品上市、下单后多久发货或到货。
    examples:
      - 某个颜色现在有没有现货？
      - 下单以后大概几天能到？
      - 缺货商品什么时候补？
    negative_examples:
      - 我的订单物流到哪了？
      - 已经发货后能不能改地址？
    clarify_question: "你是想了解商品是否有库存，还是想查询某个订单的配送进度？"
    route_policy:
      execution_route: rag
      system_route: kb_tool
      requires_rag: true

  - id: S6_配件兼容
    parent_id: KB_PRE_SALE
    level: intent
    name: 配件兼容
    type: KB
    kind: KB
    route: rag
    aliases:
      - 充电器
      - 保护壳
      - 耗材配件
      - 兼容性
    description: 用户询问充电器、保护壳、贴膜、耳塞、滤芯、刷头、耗材等配件兼容问题。
    examples:
      - 旧充电器能不能给新手机用？
      - 这款平板支持哪种手写笔？
      - 扫地机耗材多久更换一次？
    negative_examples:
      - 小米 14 Pro 支持多少瓦快充？
      - 扫地机怎么清洗水箱？
    clarify_question: "你是想确认配件兼容性，还是想了解配件/耗材的维护方法？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S7_适用场景
    parent_id: KB_PRE_SALE
    level: intent
    name: 适用场景
    type: KB
    kind: KB
    route: rag
    aliases:
      - 场景适配
      - 使用场景
      - 家庭环境
      - 人群适合
    description: 用户询问商品是否适合特定人群、家庭环境、房屋结构、运动、办公或其他场景。
    examples:
      - 我房子 150 平，想买空气净化器，哪款够用？
      - 户外跑步用耳机要注意什么？
      - 家里有门槛的房子适合买哪种扫地机？
    negative_examples:
      - 空气净化器 4 Pro 适合多大面积？
      - 预算 1000 买什么礼物？
    clarify_question: "你是想按使用场景选择商品，还是想了解某款商品的参数限制？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S8_操作指引
    parent_id: KB_USAGE
    level: intent
    name: 操作指引
    type: KB
    kind: KB
    route: rag
    aliases:
      - 使用教程
      - 操作步骤
      - 首次使用
      - 设置方法
    description: 用户咨询产品首次使用、开机、设置、定时、截图、清扫区域、模式切换等操作步骤。
    examples:
      - 扫地机首次使用要怎么启动？
      - 手机快捷操作在哪里设置？
      - 怎么设置定时清扫？
    negative_examples:
      - 设备换了路由器以后连不上
      - APP 里怎么查看订单地址？
    clarify_question: "你是想了解设备的日常操作，还是遇到了联网/配网问题？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S9_配网连接
    parent_id: KB_USAGE
    level: intent
    name: 配网连接
    type: KB
    kind: KB
    route: rag
    aliases:
      - WiFi连接
      - 联网失败
      - 设备离线
      - 蓝牙连接
    description: 用户咨询设备配网、Wi-Fi、蓝牙、路由器更换、APP 离线、连接失败等问题。
    examples:
      - 设备换了路由器以后连不上
      - 蓝牙已经连接但 APP 里还是离线
      - 扫地机添加到 APP 时失败
    negative_examples:
      - APP 里怎么查看设备记录？
      - 扫地机首次使用怎么启动？
    clarify_question: "你是想解决联网/配网问题，还是想了解 APP 里的功能操作？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S10_APP功能
    parent_id: KB_USAGE
    level: intent
    name: APP功能
    type: KB_TOOL
    kind: KB
    route: rag
    aliases:
      - APP操作
      - 订单地址
      - 清扫记录
      - 推送设置
    description: 用户咨询 APP 中的订单、地址、设备管理、清扫记录、推送、收藏、消息设置等功能。
    examples:
      - APP 里怎么查看设备记录？
      - 收货地址在哪里修改？
      - 推送消息太多怎么关？
    negative_examples:
      - 设备添加到 APP 失败
      - 我的订单现在到哪里了？
    clarify_question: "你是想了解 APP 功能操作，还是要查询具体订单/物流信息？"
    route_policy:
      execution_route: rag
      system_route: kb_tool
      requires_rag: true

  - id: S11_固件升级
    parent_id: KB_USAGE
    level: intent
    name: 固件升级
    type: KB
    kind: KB
    route: rag
    aliases:
      - 系统更新
      - 版本升级
      - 固件失败
    description: 用户咨询设备系统、固件、APP 版本升级，以及升级失败或升级后异常。
    examples:
      - 手表系统版本怎么更新？
      - 扫地机升级失败后怎么办？
      - 固件更新时需要注意什么？
    negative_examples:
      - APP 推送消息怎么关闭？
      - 设备连不上 WiFi 怎么办？
    clarify_question: "你是想了解升级步骤，还是升级失败后需要排查？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S12_生态联动
    parent_id: KB_USAGE
    level: intent
    name: 生态联动
    type: KB
    kind: KB
    route: rag
    aliases:
      - 智能家居联动
      - 自动化场景
      - 米家联动
      - 语音控制
    description: 用户咨询多个智能设备之间的自动化、语音控制、场景联动、生态兼容等问题。
    examples:
      - 开门后能不能触发家里的自动化？
      - 音箱可以控制哪些设备？
      - 离家场景可以联动哪些操作？
    negative_examples:
      - 设备换了路由器后连不上
      - APP 里怎么添加设备？
    clarify_question: "你是想设置智能联动场景，还是想解决设备连接问题？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S13_保养维护
    parent_id: KB_USAGE
    level: intent
    name: 保养维护
    type: KB
    kind: KB
    route: rag
    aliases:
      - 清洁保养
      - 耗材维护
      - 日常维护
      - 滤芯更换
    description: 用户咨询清洁、保养、维护、耗材更换、吸力变弱、水箱清洗、滤网清理等问题。
    examples:
      - 扫地机用了很久吸力变小怎么处理？
      - 水箱和滤网应该怎么清洗？
      - 手表日常清洁要注意什么？
    negative_examples:
      - 充电器能不能通用？
      - 设备无法开机怎么办？
    clarify_question: "你是想了解日常保养方法，还是设备已经出现故障？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S14_售后政策
    parent_id: KB_AFTER_SALE
    level: intent
    name: 售后政策
    type: KB
    kind: KB
    route: rag
    aliases:
      - 保修政策
      - 维修政策
      - 保修期
      - 保外维修
    description: 用户咨询保修期、保修范围、维修政策、保外费用、检测规则等售后政策。
    examples:
      - 手机整机保修怎么算？
      - 配件和电池保修范围一样吗？
      - 人为损坏还能不能维修？
    negative_examples:
      - 商品签收后还能退吗？
      - 设备充不进电怎么办？
    clarify_question: "你是想了解保修/维修政策，还是想申请退换货或报修？"
    route_policy:
      execution_route: rag
      system_route: kb
      requires_rag: true

  - id: S15_退换货
    parent_id: KB_AFTER_SALE
    level: intent
    name: 退换货
    type: KB_TOOL
    kind: KB
    route: rag
    aliases:
      - 退货退款
      - 换货
      - 无理由退货
      - 质量退换
    description: 用户咨询退货、退款、换货、无理由退货、质量问题退换、降价后重新购买等规则。
    examples:
      - 商品签收后还能不能无理由退？
      - 质量问题想换货怎么处理？
      - 刚买不久降价了能不能重新买？
    negative_examples:
      - 手机整机保修多久？
      - 我要投诉客服态度差
    clarify_question: "你是想了解退换货规则，还是要申请具体订单的退换货？"
    route_policy:
      execution_route: rag
      system_route: kb_tool
      requires_rag: true

  - id: S16_物流配送
    parent_id: KB_AFTER_SALE
    level: intent
    name: 物流配送
    type: KB_TOOL
    kind: KB
    route: rag
    aliases:
      - 配送
      - 快递
      - 改地址
      - 物流异常
    description: 用户咨询发货、配送、物流规则、改地址、拒收、签收、物流超时等问题。
    examples:
      - 已经发货后还能不能修改地址？
      - 包裹几天没有物流更新怎么办？
      - 下单后一般多久送到？
    negative_examples:
      - 帮我查订单 123456 到哪里了
      - 商品现在有没有现货？
    clarify_question: "你是想了解物流配送规则，还是要查询具体订单的物流状态？"
    route_policy:
      execution_route: rag
      system_route: kb_tool
      requires_rag: true

  - id: S17_发票会员
    parent_id: KB_AFTER_SALE
    level: intent
    name: 发票会员
    type: KB_TOOL
    kind: KB
    route: rag
    aliases:
      - 发票
      - 开票
      - 抬头
      - 会员积分
    description: 用户咨询发票申请、发票抬头、开票状态、会员权益、积分使用等规则。
    examples:
      - 电子发票在哪里申请？
      - 公司抬头填错了还能改吗？
      - 积分能不能抵扣订单？
    negative_examples:
      - 帮我给订单 123456 开发票
      - 商品退货后多久退款？
    clarify_question: "你是想了解发票/会员规则，还是要处理某个订单的发票？"
    route_policy:
      execution_route: rag
      system_route: kb_tool
      requires_rag: true

  - id: F1_故障报告
    parent_id: TICKET
    level: intent
    name: 故障报告
    type: KB_TICKET
    kind: TICKET
    route: ticket
    aliases:
      - 设备故障
      - 异常报错
      - 无法使用
      - 发热异常
    description: 用户反馈设备无法使用、异常、报错、充电失败、不开机、发热等故障。
    examples:
      - 扫地机放回底座以后一直充不上电
      - 手表开不了机需要怎么排查？
      - 设备使用时反复报错
    negative_examples:
      - 手表系统怎么升级？
      - 扫地机滤网怎么清洗？
    clarify_question: "你是想先看故障排查方法，还是要提交售后工单？"
    route_policy:
      execution_route: rag
      system_route: kb_ticket
      requires_rag: true

  - id: F2_功能建议
    parent_id: TICKET
    level: intent
    name: 功能建议
    type: TICKET
    kind: TICKET
    route: ticket
    aliases:
      - 产品建议
      - 功能优化
      - 新增功能
    description: 用户提出产品功能、APP 功能、体验优化、模式新增、交互改进等建议。
    examples:
      - 希望 APP 能增加儿童模式
      - 建议扫地机增加一个宠物毛发模式
      - 能不能优化一下推送提醒？
    negative_examples:
      - APP 推送消息太多怎么关闭？
      - 设备连接不上怎么办？
    clarify_question: "你是想提交功能建议，还是想了解现有功能怎么使用？"
    route_policy:
      execution_route: ticket
      system_route: ticket
      requires_rag: false

  - id: F3_投诉吐槽
    parent_id: TICKET
    level: intent
    name: 投诉吐槽
    type: TICKET
    kind: TICKET
    route: ticket
    aliases:
      - 投诉
      - 差评
      - 不满
      - 维权
    description: 用户表达强烈不满、投诉、差评、维权、服务态度差、要求人工处理等。
    examples:
      - 我要投诉你们客服
      - 这个服务太差了
      - 我要给差评
      - 你们这是欺骗消费者
    negative_examples:
      - 物流几天没有更新怎么办？
      - 设备充不进电怎么排查？
    clarify_question: "你是想投诉服务体验，还是需要我先帮你处理具体订单或售后问题？"
    route_policy:
      execution_route: ticket
      system_route: ticket
      requires_rag: false

  - id: C1_寒暄问候
    parent_id: SYSTEM
    level: intent
    name: 寒暄问候
    type: CHITCHAT
    kind: SYSTEM
    route: system_response
    aliases:
      - 你好
